<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/school%20logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />

    <title>Phronesis Int'l School - Result Checker</title>
    <meta name="description" content="Check academic results for Phronesis International School students. Secure online result checking portal for parents and teachers." />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Phronesis Int'l School - Result Checker" />
    <meta property="og:description" content="Check academic results for Phronesis International School students. Secure online result checking portal for parents and teachers." />
    <meta property="og:image" content="/school%20logo.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:site_name" content="Phronesis Int'l School" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Phronesis Int'l School - Result Checker" />
    <meta name="twitter:description" content="Check academic results for Phronesis International School students." />
    <meta name="twitter:image" content="/school%20logo.png" />
  </head>
  <body>
    <div id="app-loader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1B5E20 0%,#2E7D32 50%,#1B5E20 100%);transition:opacity 0.4s ease,visibility 0.4s ease;">
      <img src="/school%20logo.png" alt="Phronesis Logo" style="width:80px;height:80px;border-radius:50%;border:3px solid #F59E0B;object-fit:cover;margin-bottom:24px;animation:pulse-loader 1.5s ease-in-out infinite;" />
      <div style="color:white;font-family:'Roboto',sans-serif;font-size:1.25rem;font-weight:600;letter-spacing:0.5px;margin-bottom:32px;">Phronesis Int'l School</div>
      <div style="display:flex;gap:8px;">
        <span class="loader-dot" style="width:10px;height:10px;border-radius:50%;background:#F59E0B;animation:bounce-loader 1.4s ease-in-out infinite;"></span>
        <span class="loader-dot" style="width:10px;height:10px;border-radius:50%;background:#F59E0B;animation:bounce-loader 1.4s ease-in-out 0.2s infinite;"></span>
        <span class="loader-dot" style="width:10px;height:10px;border-radius:50%;background:#F59E0B;animation:bounce-loader 1.4s ease-in-out 0.4s infinite;"></span>
      </div>
      <style>
        @keyframes pulse-loader { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        @keyframes bounce-loader { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-14px)} }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
