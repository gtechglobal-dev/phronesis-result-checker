services:
  - type: web
    name: phronesis-backend
    runtime: node
    repo: https://github.com/gtechglobal-dev/phronesis-result-checker
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci
    startCommand: node src/index.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://phronesis-frontend.onrender.com
      - key: ADMIN_USERNAMES
        value: Admin1,Admin2,Admin3
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUBJECT_TEACHER_PASSWORD
        sync: false

  - type: static
    name: phronesis-frontend
    repo: https://github.com/gtechglobal-dev/phronesis-result-checker
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: phronesis-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
